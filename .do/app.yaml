name: signal-agent

services:
  - name: backend
    source_dir: /backend
    dockerfile_path: backend/Dockerfile
    github:
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_size_slug: basic-xxs
    envs:
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SENSO_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: JIRA_EMAIL
        scope: RUN_TIME
        type: SECRET
      - key: JIRA_API_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: JIRA_BASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: JIRA_PROJECT_KEY
        scope: RUN_TIME
        type: SECRET
      - key: NOTION_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: NOTION_ROADMAP_DB_ID
        scope: RUN_TIME
        type: SECRET
      - key: SLACK_WEBHOOK_URL
        scope: RUN_TIME
        type: SECRET
      - key: UNKEY_ROOT_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DEMO_TEST_EVENTS
        scope: RUN_TIME
        value: "false"
      - key: FRONTEND_URL
        scope: RUN_TIME
        value: ${frontend.PUBLIC_URL}

  - name: frontend
    source_dir: /frontend
    dockerfile_path: frontend/Dockerfile
    github:
      branch: main
      deploy_on_push: true
    http_port: 3000
    instance_size_slug: basic-xxs
    envs:
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: NEXT_PUBLIC_BACKEND_URL
        scope: BUILD_TIME
        value: ${backend.PUBLIC_URL}
